<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form 2</title>
</head>
<body>
    <form action="" method=""  target="">
    <fieldset>
        <legend>
            basic information:
        </legend>
        <label for="username">username:</label>
        <input type="text" name="username" id="username" > <br><br>
        <label for="fathername">fathername</label>
        <input type="text" name="fathername" id="fathername"> <br><br>
        <label for="mothername">mothername</label>
        <input type="text" name="mothername" id="mothername"> <br><br>
        <label for="dob">date of birth</label>
        <input type="date" name="dob" id="dob"> <br><br>
        <label for="age">age</label>
        <input type="number" name="age" id="age" min="18" max="50"><br><br>
        <label for="gender">gender</label>
        <input type="radio" name="gender" id="gender" value="male">male
        <input type="radio" name="gender" id="gender" value="female">female
        <input type="radio" name="gender" id="gender" value="other">other <br><br>
    </fieldset>

    <fieldset>
        <legend>contact info:</legend>
        <label for="photo">profile photo:</label>
        <input type="file" name="photo" id="photo" accept="image/png , image/pneg"> <br><br>    
        <label for="email">email:</label>
        <input type="email" name="email" id="email"> <br><br>
        <label for="phone">phone:</label>
        <input type="tel" name="phone" id="phone"> <br><br>
        <label for="linkdin">linkdin url:</label>
        <input type="url" name="linkdin" id="linkdin"> <br><br>
        <label for="address">address:</label>
        <input type="text" name="address" id="address" aria-rowcount="5" aria-colspan="20"> <br><br>
    </fieldset>
     
    <fieldset>
        <legend>hobbies & favorite :</legend>
        <label for="lang">favorite language:</label>
        <input type="checkbox" name="lang" id="lang" value="java">java
        <input type="checkbox" name="lang" id="lang" value="python">python
        <input type="checkbox" name="lang" id="lang" value="c++">c++ <br><br>

        <label for="food">favorite food:</label>
        <select name="" id="">
            <option value="">--select option--</option>
            <option value="pizza">pizza</option>
            <option value="burger">burger</option>
            <option value="pasta">pasta</option>
            <option value="chikan">chikan</option>
            <option value="vadapav">vadapav</option>
        </select>
        <br><br>
        <label for="pets">pets</label>
        <input type="pets">
        <datalist id="pets">
            <option value="dog">
            <option value="cat">
            <option value="hamster">
            <option value="rabbit">

        </datalist>

    </fieldset>


        <button type="submit">submit</button>
        <button type="reset">reset</button>
    </form>
</body>
</html>
