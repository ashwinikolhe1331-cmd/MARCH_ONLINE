<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operators in js</title>
</head>
<body>
    <script>
        let a=10;
        let b=20;
        console.log(a+b);
        console.log(a-b);

        console.log(a*b);
        console.log(a/b);  
        console.log(a%b);
        console.log(a**b); 

        let x=5;
        console.log(x);

        x+=a
        console.log(x);

        x-=a
        console.log(x);


        console.log(a==b);
        console.log(a!=b);




        //cocatenetion//
        console.log(10+10);
        console.log(10+"ashwini");
        console.log("ashwini"+10+10);
        console.log(10+10+"ashwini");


        let name= "ashwini";
        console.log(`hallo ${name}`);


        let value=10;
        console.log(value);
        console.log(value++);
        console.log(++value);
        console.log(--value);
        value++;


        let v=10;
        let y=6;

        let result= ++v + y++ - --y + v++;
        console.log(v);
        console.log(y);
        console.log(result);    
    </script>
</body>
</html>
