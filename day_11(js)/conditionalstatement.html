<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Statement</title>
</head>
<body>
    <script>
        let num=11;
        if(num%2==0){
            console.log(num,' is even number');
        }

        let age=16;
        if(age>=18&&age<=30){
            console.log('you are eligible for job');
        }
        else{
            console.log('you are not eligible for job');
        }




        let markse=135;
        if(markse>=90&&markse<=100){
            console.log('grade A');
        }
        else if(markse>=80&&markse<=90){
            console.log('grade B');
        }
        else if(markse>=70&&markse<=80){
            console.log('grade C');
        }
        else if(markse>=60&&markse<=70){
            console.log('grade D');
        }
        else if(markse>=60&&markse<70){
            console.log('grade F');
        }
        else{
            console.log('faile');
        }
        



      let day= 1;
        switch(day){
            case 1:{
                console.log('sunday');
                
            }break;
            case 2:{
                console.log('monday');
            }break;
            case 3:{
                console.log('tuesday');
                
            }break;
            case 4:{
                console.log('wednesday');
            
            }break;
            case 5:{
                console.log('thursday');
                
            }
            case 6:{
                console.log('friday');
                
            }break;
            case 7:{
                console.log('saturday');
                
            } break;
            default:{
                console.log('invalid day');
            }
        }



        

    </script>
</body>
</html>
